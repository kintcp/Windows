name: Windows Testflight

on:
  push:
    branches:
      - windows/beta
      - windows/release
      - windows/nightly
    tags:
      - v**
  pull_request:

  workflow_dispatch:
    inputs:
      ref:
        description: "Name of the branch"
        required: false
        default: "develop"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: windows-2022
    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
      build_id: ${{ steps.version.outputs.build_id }}
      buildtime: ${{ steps.version.outputs.buildtime }}

    steps:
      - name: 🌸 Checkout
        uses: actions/checkout@v4
        with:
          repository: saltpi/iPlay.Windows
          ref: ${{ github.event.inputs.ref || 'develop' }}
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🔢 Prepare version
        id: version
        shell: bash
        run: |
          version_code="$(git rev-list --count HEAD)"
          build_id="$(git rev-parse --short HEAD)"
          buildtime="$(date '+%Y%m%d.%H%M')"

          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "buildtime=$buildtime" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            runtime_identifier: win-x64
            vc_arch: amd64

          - platform: ARM64
            runtime_identifier: win-arm64
            vc_arch: amd64_arm64

    env:
      Solution_Name: iPlay
      Project_Directory: iPlay.X

    steps:
      - name: 🌸 Checkout
        uses: actions/checkout@v4
        with:
          repository: saltpi/iPlay.Windows
          ref: ${{ github.event.inputs.ref || 'develop' }}
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: 👷 Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: 👷 Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vc_arch }}

      - name: 🔧 Create LLVM runtime targets
        shell: pwsh
        run: |
          $arm64Builtin = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Tools\Llvm\ARM64\lib\clang\*\lib\windows\clang_rt.builtins-aarch64.lib" `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $arm64Builtin) {
            throw "clang_rt.builtins-aarch64.lib not found"
          }

          $x64Builtin = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Tools\Llvm\x64\lib\clang\*\lib\windows\clang_rt.builtins-x86_64.lib" `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          $arm64LibDir = $arm64Builtin.Directory.FullName
          $x64LibDir = if ($x64Builtin) { $x64Builtin.Directory.FullName } else { "" }

          Write-Host "Found ARM64 LLVM builtins: $($arm64Builtin.FullName)"
          Write-Host "ARM64 LLVM lib dir: $arm64LibDir"

          if ($x64Builtin) {
            Write-Host "Found x64 LLVM builtins: $($x64Builtin.FullName)"
            Write-Host "x64 LLVM lib dir: $x64LibDir"
          } else {
            Write-Host "x64 LLVM builtins not found, skip x64 LLVM lib dir."
          }

          $targetsPath = Join-Path $env:GITHUB_WORKSPACE "llvm-runtime.targets"

          $targetsContent = @"
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemDefinitionGroup Condition="'`$(Platform)' == 'ARM64'">
              <Link>
                <AdditionalLibraryDirectories>$arm64LibDir;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
                <AdditionalOptions>/LIBPATH:&quot;$arm64LibDir&quot; %(AdditionalOptions)</AdditionalOptions>
              </Link>
            </ItemDefinitionGroup>

            <ItemDefinitionGroup Condition="'`$(Platform)' == 'x64' And '$x64LibDir' != ''">
              <Link>
                <AdditionalLibraryDirectories>$x64LibDir;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
                <AdditionalOptions>/LIBPATH:&quot;$x64LibDir&quot; %(AdditionalOptions)</AdditionalOptions>
              </Link>
            </ItemDefinitionGroup>
          </Project>
          "@

          Set-Content -Path $targetsPath -Value $targetsContent -Encoding UTF8

          Write-Host "Generated targets:"
          Get-Content $targetsPath

      - name: 🔎 Check build environment
        shell: pwsh
        run: |
          where msbuild
          where clang-cl

          Write-Host "Platform: ${{ matrix.platform }}"
          Write-Host "RuntimeIdentifier: ${{ matrix.runtime_identifier }}"
          Write-Host "VC arch: ${{ matrix.vc_arch }}"

          Write-Host "=== LIB ==="
          $env:LIB -split ';'

      - name: ⏰ Cache
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ matrix.platform }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.platform }}-
            ${{ runner.os }}-nuget-

      - name: ⏬ Install deps
        shell: pwsh
        run: |
          nuget restore X.Player\X.Player.vcxproj -OutputDirectory packages

      - name: ✅ Decode and Import Certificate
        shell: pwsh
        run: |
          $base64Data = "${{ secrets.CERTIFICATE_PFX }}"
          $bytes = [Convert]::FromBase64String($base64Data)
          $certificatePath = Join-Path -Path "${{ github.workspace }}" -ChildPath signing_cert.pfx
          [System.IO.File]::WriteAllBytes("$certificatePath", $bytes)

          Import-PfxCertificate `
            -FilePath "$certificatePath" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -Force -AsPlainText)

      - name: ✅ Verify Certificate Installation
        shell: pwsh
        run: |
          Get-ChildItem Cert:\CurrentUser\My |
            Where-Object { $_.Thumbprint -eq "028ACD7A6EF34F66E29087B84A40B6579187570B" }

      - name: 🧬 Build ${{ matrix.platform }} store package
        shell: pwsh
        run: |
          .\Desktop\version.ps1

          msbuild .\Desktop\Desktop.csproj `
            /m `
            /p:Configuration="release" `
            /p:Platform="${{ matrix.platform }}" `
            /p:RuntimeIdentifier="${{ matrix.runtime_identifier }}" `
            /p:AppxBundlePlatforms="${{ matrix.platform }}" `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:PackageOptionalProjectsInIdeBuilds=False `
            /p:AppxPackageSigningEnabled=true `
            /p:GenerateAppxPackageOnBuild=true `
            "/p:ForceImportAfterCppTargets=$env:GITHUB_WORKSPACE\llvm-runtime.targets" `
            --restore

      - name: 📦 Upload ${{ matrix.platform }} AppPackages
        uses: actions/upload-artifact@v4
        with:
          name: apppackages-${{ matrix.platform }}
          path: Desktop/AppPackages/**
          if-no-files-found: error
          retention-days: 1

      - name: 🧹 Remove Installed Certificate
        if: always()
        shell: pwsh
        run: |
          $thumbprint = "028ACD7A6EF34F66E29087B84A40B6579187570B"
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Thumbprint -eq $thumbprint }
          if ($cert) {
            Remove-Item -Path "Cert:\CurrentUser\My\$thumbprint" -Force
            Write-Host "Certificate with thumbprint $thumbprint has been removed."
          } else {
            Write-Host "Certificate with thumbprint $thumbprint not found."
          }

  package-and-release:
    name: Package and Release
    needs:
      - prepare
      - build
    runs-on: windows-2022
    if: github.event_name != 'pull_request'

    env:
      version_code: ${{ needs.prepare.outputs.version_code }}
      build_id: ${{ needs.prepare.outputs.build_id }}
      buildtime: ${{ needs.prepare.outputs.buildtime }}
      version_name: "v1.0 ${{ needs.prepare.outputs.build_id }}"

    steps:
      - name: 🌸 Checkout
        uses: actions/checkout@v4
        with:
          repository: saltpi/iPlay.Windows
          ref: ${{ github.event.inputs.ref || 'develop' }}
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: 📥 Download AppPackages
        uses: actions/download-artifact@v4
        with:
          pattern: apppackages-*
          path: Desktop/AppPackages
          merge-multiple: true

      - name: 🔎 List downloaded files
        shell: pwsh
        run: |
          Get-ChildItem Desktop\AppPackages -Recurse | Select-Object FullName

      - name: ✅ Decode and Import Certificate
        shell: pwsh
        run: |
          $base64Data = "${{ secrets.CERTIFICATE_PFX }}"
          $bytes = [Convert]::FromBase64String($base64Data)
          $certificatePath = Join-Path -Path "${{ github.workspace }}" -ChildPath signing_cert.pfx
          [System.IO.File]::WriteAllBytes("$certificatePath", $bytes)

          Import-PfxCertificate `
            -FilePath "$certificatePath" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -Force -AsPlainText)

      - name: 📦 Merge packages
        shell: pwsh
        run: |
          cd .\Desktop
          .\merge_zip.ps1
          .\merge_appx.ps1

      - name: 🔢 Prepare publish files
        shell: bash
        run: |
          mkdir -p Desktop/Publish

          cp "Desktop/AppPackages/ZipPackages/iPlayX_1.0.${version_code}.0_ARM64_Sideload.zip" Desktop/Publish/
          cp "Desktop/AppPackages/ZipPackages/iPlayX_1.0.${version_code}.0_x64_Sideload.zip" Desktop/Publish/
          cp "Desktop/AppPackages/iPlayX_1.0.${version_code}.0.msixbundle" Desktop/Publish/

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: endpne/iPlay-Release-Windows
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          name: Windows Build ${{ needs.prepare.outputs.version_code }}
          tag_name: windows-build-${{ needs.prepare.outputs.version_code }}
          make_latest: true
          body: |
            Windows TestFlight Build ${{ needs.prepare.outputs.version_code }}

            Build artifacts:
            - iPlay.msixbundle (TestFlight package)

            **Installation Options:**
            1. Use the .msixbundle file for TestFlight distribution
          files: |
            Desktop/AppPackages/ZipPackages/iPlayX_1.0.${{ needs.prepare.outputs.version_code }}.0_ARM64_Sideload.zip
            Desktop/AppPackages/ZipPackages/iPlayX_1.0.${{ needs.prepare.outputs.version_code }}.0_x64_Sideload.zip
            Desktop/AppPackages/iPlayX_1.0.${{ needs.prepare.outputs.version_code }}.0.msixbundle

      - name: ⬆️ Submit to Microsoft Store
        uses: ourfor/windows-store-action@1.0.5
        with:
          tenant-id: "f11cb049-47ea-4ac4-b157-de33439868de"
          client-id: "${{ secrets.STORE_CLIENT_ID }}"
          client-secret: "${{ secrets.STORE_CLIENT_SECRET }}"
          package-path: "Desktop/Publish"
          app-id: "9NBZ2BXD4WFZ"
          flight-id: "cc78bd2f-f625-4e26-aeff-2ca1b3c486ab"
          delete-packages: false
          packages-keep: true
          skip-polling: true

      - name: 🧹 Remove Installed Certificate
        if: always()
        shell: pwsh
        run: |
          $thumbprint = "028ACD7A6EF34F66E29087B84A40B6579187570B"
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Thumbprint -eq $thumbprint }
          if ($cert) {
            Remove-Item -Path "Cert:\CurrentUser\My\$thumbprint" -Force
            Write-Host "Certificate with thumbprint $thumbprint has been removed."
          } else {
            Write-Host "Certificate with thumbprint $thumbprint not found."
          }
